{% extends "base.html" %}

{% block content %}

<!-- Page Header -->
<div class="d-flex justify-content-between align-items-start mb-4">
  <div>
    <h1 class="page-title">Transaksi</h1>
    <p class="page-subtitle">Catat setiap pemasukan dan pengeluaran Anda</p>
  </div>
  <input type="month" id="filterMonth" class="form-control w-auto"
         onchange="loadTransactions()">
</div>

<div class="row g-4">

  <!-- ── Form Tambah / Edit ── -->
  <div class="col-lg-4">
    <div class="card h-100">
      <div class="card-header" id="formHeader">
        <div class="header-icon" id="formIcon"
             style="background:rgba(123,97,255,0.15);color:var(--accent)">
          <i class="bi bi-plus-lg"></i>
        </div>
        <span id="formTitle">Tambah Transaksi</span>
      </div>
      <div class="card-body d-flex flex-column gap-3">

        <!-- Input tersembunyi untuk simpan ID saat mode edit -->
        <input type="hidden" id="editId" value="">

        <div>
          <label class="form-label">Judul</label>
          <input type="text" id="title" class="form-control"
                 placeholder="Contoh: Makan siang">
        </div>

        <div>
          <label class="form-label">Nominal (Rp)</label>
          <input type="number" id="amount" class="form-control" placeholder="0">
        </div>

        <div class="row g-2">
          <div class="col-6">
            <label class="form-label">Tipe</label>
            <select id="type" class="form-select">
              <option value="expense">📤 Pengeluaran</option>
              <option value="income">📥 Pemasukan</option>
            </select>
          </div>
          <div class="col-6">
            <label class="form-label">Tanggal</label>
            <input type="date" id="date" class="form-control">
          </div>
        </div>

        <div>
          <label class="form-label">Kategori</label>
          <select id="category" class="form-select">
            <option value="Makan">🍔 Makan</option>
            <option value="Transport">🚗 Transport</option>
            <option value="Belanja">🛍️ Belanja</option>
            <option value="Hiburan">🎮 Hiburan</option>
            <option value="Kesehatan">💊 Kesehatan</option>
            <option value="Gaji">💰 Gaji</option>
            <option value="Lainnya">📦 Lainnya</option>
          </select>
        </div>

        <div>
          <label class="form-label">
            Catatan
            <span style="color:var(--muted);text-transform:none;font-size:11px">
              (opsional)
            </span>
          </label>
          <input type="text" id="note" class="form-control"
                 placeholder="Tambahkan catatan...">
        </div>

        <!-- Tombol Submit — berubah teks sesuai mode -->
        <button id="submitBtn" onclick="submitForm()"
                class="btn btn-primary w-100 mt-auto">
          <i class="bi bi-plus-lg me-1"></i> Tambah Transaksi
        </button>

        <!-- Tombol Batal Edit — hanya muncul saat mode edit -->
        <button id="cancelBtn" onclick="cancelEdit()"
                class="btn w-100"
                style="display:none; background:var(--bg3);
                       color:var(--muted); border:1px solid var(--border);
                       border-radius:10px; padding:11px;">
          <i class="bi bi-x-lg me-1"></i> Batal Edit
        </button>

      </div>
    </div>
  </div>

  <!-- ── Daftar Transaksi ── -->
  <div class="col-lg-8">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2">
          <div class="header-icon"
               style="background:rgba(0,212,170,0.12);color:var(--income)">
            <i class="bi bi-list-ul"></i>
          </div>
          Riwayat Transaksi
        </div>
        <span id="txCount"
              style="font-size:12px;color:var(--muted);
                     font-family:'DM Sans',sans-serif;font-weight:400">
        </span>
      </div>
      <div class="card-body">
        <div id="transactionList">
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <p>Memuat data transaksi...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/transactions.js') }}"></script>
{% endblock %}
