{% extends "base.html" %}

{% block content %}

<!-- Page Header -->
<div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-3">
  <div>
    <h1 class="page-title">Transaksi</h1>
    <p class="page-subtitle">Catat setiap pemasukan dan pengeluaran Anda</p>
  </div>
  <div class="d-flex gap-2 align-items-center flex-wrap">
    <button onclick="exportPDF()"
            class="btn btn-primary"
            style="border-color:var(--neon-cyan) !important;
                   color:var(--neon-cyan) !important;
                   box-shadow:0 0 10px rgba(0,229,255,0.2) !important;
                   font-size:10px !important;padding:8px 14px !important">
      <i class="bi bi-file-earmark-pdf me-1"></i> Export PDF
    </button>
    <input type="month" id="filterMonth" class="form-control w-auto"
           onchange="loadTransactions()">
  </div>
</div>

<!-- Layout: Form kiri (col-lg-4), Riwayat kanan (col-lg-8) -->
<!-- Di mobile: stack vertikal — form di atas, riwayat di bawah -->
<div class="row g-4">

  <!-- ── Form Tambah / Edit ── -->
  <div class="col-12 col-lg-4">
    <div class="card">
      <div class="card-header" id="formHeader">
        <div class="header-icon" id="formIcon"
             style="background:rgba(0,255,180,0.1);color:var(--neon-green)">
          <i class="bi bi-plus-lg"></i>
        </div>
        <span id="formTitle">Tambah Transaksi</span>
      </div>
      <div class="card-body d-flex flex-column gap-3">

        <input type="hidden" id="editId" value="">

        <div>
          <label class="form-label">Judul</label>
          <input type="text" id="title" class="form-control"
                 placeholder="Contoh: Makan siang">
        </div>

        <div>
          <label class="form-label">Nominal (Rp)</label>
          <input type="number" id="amount" class="form-control" placeholder="0">
        </div>

        <!-- Tipe & Tanggal side by side -->
        <div class="row g-2">
          <div class="col-6">
            <label class="form-label">Tipe</label>
            <select id="type" class="form-select">
              <option value="expense">📤 Pengeluaran</option>
              <option value="income">📥 Pemasukan</option>
            </select>
          </div>
          <div class="col-6">
            <label class="form-label">Tanggal</label>
            <input type="date" id="date" class="form-control">
          </div>
        </div>

        <div>
          <label class="form-label">Kategori</label>
          <select id="category" class="form-select">
            <option value="Makan">🍔 Makan</option>
          </select>
        </div>

        <div>
          <label class="form-label">
            Catatan
            <span style="color:var(--muted);text-transform:none;
                         font-size:11px;font-family:'Rajdhani',sans-serif">
              (opsional)
            </span>
          </label>
          <input type="text" id="note" class="form-control"
                 placeholder="Tambahkan catatan...">
        </div>

        <button id="submitBtn" onclick="submitForm()"
                class="btn btn-primary w-100 mt-1">
          <i class="bi bi-plus-lg me-1"></i> Tambah Transaksi
        </button>

        <button id="cancelBtn" onclick="cancelEdit()"
                class="btn w-100"
                style="display:none;background:transparent;
                       color:var(--muted2);border:1px solid rgba(0,255,180,0.15);
                       border-radius:4px;padding:10px;
                       font-family:'Orbitron',sans-serif;
                       font-size:10px;letter-spacing:0.08em;
                       text-transform:uppercase;transition:all 0.2s">
          <i class="bi bi-x-lg me-1"></i> Batal Edit
        </button>

      </div>
    </div>
  </div>

  <!-- ── Riwayat Transaksi ── -->
  <div class="col-12 col-lg-8">
    <div class="card h-100">
      <div class="card-header d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2">
          <div class="header-icon"
               style="background:rgba(0,229,255,0.1);color:var(--neon-cyan)">
            <i class="bi bi-list-ul"></i>
          </div>
          Riwayat Transaksi
        </div>
        <span id="txCount"
              style="font-size:11px;color:var(--muted2);
                     font-family:'Rajdhani',sans-serif;font-weight:600;
                     letter-spacing:0.06em">
        </span>
      </div>
      <div class="card-body">
        <div id="transactionList">
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <p>Memuat data transaksi...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/transactions.js') }}"></script>
{% endblock %}
