<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prospr</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Google Fonts: Orbitron + Rajdhani -->
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <!-- Custom CSS -->
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">

  <!-- CSRF Token untuk JavaScript fetch() -->
  <meta name="csrf-token" content="{{ csrf_token() }}">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-4">

      <a class="navbar-brand" href="/dashboard">
        <svg width="38" height="38" viewBox="0 0 38 38" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#00ffb4" />
              <stop offset="100%" stop-color="#bf00ff" />
            </linearGradient>
            <linearGradient id="hexFill" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#00ffb4" stop-opacity="0.1" />
              <stop offset="100%" stop-color="#bf00ff" stop-opacity="0.1" />
            </linearGradient>
          </defs>

          <!-- Hexagon -->
          <polygon points="19,2 34,10.5 34,27.5 19,36 4,27.5 4,10.5" fill="url(#hexFill)" stroke="url(#hexGrad)"
            stroke-width="1.5" />

          <!-- Lightning bolt -->
          <polygon points="22,8 13,21 19,21 16,31 27,18 20,18" fill="url(#hexGrad)" />

          <!-- Spark kiri atas -->
          <line x1="5" y1="13" x2="9" y2="11" stroke="#bf00ff" stroke-width="1" stroke-linecap="round" opacity="0.7" />

          <!-- Spark kanan tengah -->
          <line x1="33" y1="19" x2="37" y2="19" stroke="#00ffb4" stroke-width="1" stroke-linecap="round"
            opacity="0.7" />

          <!-- Spark kanan bawah -->
          <line x1="32" y1="28" x2="36" y2="31" stroke="#bf00ff" stroke-width="1" stroke-linecap="round"
            opacity="0.6" />
        </svg>
        Prospr
      </a>

      <!-- Mobile toggle (opsional, untuk layar sangat kecil) -->
      <div class="navbar-nav ms-auto d-flex flex-row align-items-center gap-1 flex-wrap">

        <a class="nav-link {% if request.path == '/dashboard' %}active{% endif %}" href="/dashboard">
          <i class="bi bi-speedometer2"></i>
          <span>Dashboard</span>
        </a>

        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
          <i class="bi bi-arrow-left-right"></i>
          <span>Transaksi</span>
        </a>

        <!-- Divider -->
        <div style="width:1px;height:18px;background:var(--border2);margin:0 4px"></div>

        <!-- Link Profil -->
        <a href="/profile" class="nav-link {% if request.path == '/profile' %}active{% endif %}">
          <i class="bi bi-person-circle"></i>
          <span>{{ current_user.username }}</span>
        </a>

        <!-- Logout -->
        <a href="/logout" class="nav-link" style="color:var(--neon-pink) !important;">
          <i class="bi bi-box-arrow-right"></i>
          <span>Logout</span>
        </a>

      </div>
    </div>
  </nav>

  <!-- Page Content — container-fluid agar mengisi lebar penuh -->
  <div class="container-fluid px-4 py-4">
    {% block content %}{% endblock %}
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  {% block scripts %}{% endblock %}

</body>

</html>
